# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC for npm trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - name: Debug trusted publisher identity
        run: |
          echo "repository=${{ github.repository }}"
          echo "repository_owner=${{ github.repository_owner }}"
          echo "repository=${{ github.event.repository.full_name }}"
          echo "workflow_file=release.yml"
          echo "ref=${{ github.ref }}"
      - name: Publish to npm via OIDC
        run: |
          echo "node $(node -v), npm $(npm -v)"
          echo "OIDC: ${ACTIONS_ID_TOKEN_REQUEST_URL:+available}"
          unset NODE_AUTH_TOKEN
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            grep -v '_authToken' "$NPM_CONFIG_USERCONFIG" > "${NPM_CONFIG_USERCONFIG}.clean" || true
            mv "${NPM_CONFIG_USERCONFIG}.clean" "$NPM_CONFIG_USERCONFIG"
          fi
          npm publish --access public --loglevel verbose